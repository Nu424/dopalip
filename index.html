<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FLIP DECK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#141220; --panel:#1d1a2b; --hair:#2f2b42;
    --text:#ECEAF4; --muted:#8f88a8; --accent:#FF5A6E;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(120% 80% at 50% -10%, #221d36 0%, var(--ink) 55%) fixed, var(--ink);
    color:var(--text); font-family:"Space Grotesk", system-ui, sans-serif; overflow:hidden;
  }

  /* ===== スワイプ本体 ===== */
  .feed{
    height:100dvh; overflow-y:scroll; scroll-snap-type:y mandatory;
    scrollbar-width:none; -webkit-overflow-scrolling:touch; scroll-behavior:smooth;
  }
  .feed::-webkit-scrollbar{display:none}
  .slide{
    height:100dvh; scroll-snap-align:center; scroll-snap-stop:always;
    display:grid; place-items:center; padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .card{
    position:relative; width:min(430px,94vw); height:min(92dvh,860px);
    border-radius:26px; background:var(--panel); border:1px solid var(--hair);
    box-shadow:0 30px 80px -30px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.02) inset;
    overflow:hidden; transform:scale(.965); opacity:.5;
    transition:transform .5s cubic-bezier(.2,.8,.2,1), opacity .5s;
  }
  .slide.active .card{transform:scale(1);opacity:1}
  .card iframe{width:100%;height:100%;border:0;display:block;background:#000}
  .tag{
    position:absolute;top:12px;left:12px;z-index:2;
    font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.08em;color:var(--text);
    background:rgba(10,8,18,.55);backdrop-filter:blur(6px);padding:5px 9px;border-radius:999px;
    border:1px solid rgba(255,255,255,.1);pointer-events:none;max-width:70%;overflow:hidden;
    white-space:nowrap;text-overflow:ellipsis;
  }

  /* ===== HUD ===== */
  .hud{position:fixed;inset:0;pointer-events:none;z-index:20}

  /* 右上：YouTube Shorts 風の点々（メニュー） */
  .menu-btn{
    position:absolute;top:18px;right:18px;pointer-events:auto;
    width:42px;height:42px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:var(--text);background:rgba(13,11,22,.6);backdrop-filter:blur(10px);
    border:1px solid var(--hair);cursor:pointer;transition:border-color .2s, background .2s;
  }
  .menu-btn:hover{border-color:var(--accent)}
  .menu-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .menu-btn .dots{display:flex;flex-direction:column;gap:3px}
  .menu-btn .dots i{width:4px;height:4px;border-radius:50%;background:currentColor;display:block}

  .rail{
    position:absolute;right:16px;top:50%;transform:translateY(-50%);pointer-events:auto;
    display:flex;flex-direction:column;align-items:center;gap:10px;max-height:60dvh;overflow:hidden;
  }
  .rail .dot{width:5px;border:0;background:var(--hair);border-radius:999px;height:14px;cursor:pointer;
    transition:height .25s, background .25s;padding:0;flex:none}
  .rail .dot.on{height:30px;background:var(--accent)}
  .rail .dot:focus-visible{outline:2px solid var(--accent);outline-offset:3px}

  .counter{
    position:fixed;right:16px;bottom:20px;z-index:20;pointer-events:none;
    font-family:"Space Mono",monospace;font-size:13px;letter-spacing:.1em;color:var(--muted);text-align:right;
  }
  .counter b{color:var(--accent);font-weight:700}

  .hint{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:20;font-size:12px;
    color:var(--muted);letter-spacing:.04em;pointer-events:none;transition:opacity .6s}
  .hint.gone{opacity:0}

  .toast{
    position:fixed;left:50%;top:64px;transform:translateX(-50%) translateY(-12px);z-index:60;
    background:var(--accent);color:#1a0f14;font-weight:700;font-size:13px;padding:9px 18px;border-radius:999px;
    opacity:0;pointer-events:none;transition:opacity .3s, transform .3s;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ===== お品書きモーダル ===== */
  .sheet{
    position:fixed;inset:0;z-index:50;display:none;
    background:rgba(8,6,14,.72);backdrop-filter:blur(6px);
  }
  .sheet.on{display:block}
  .sheet-panel{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:min(440px,92vw);max-height:86dvh;display:flex;flex-direction:column;
    background:var(--panel);border:1px solid var(--hair);border-radius:24px;
    box-shadow:0 40px 100px -30px rgba(0,0,0,.8);overflow:hidden;
  }
  .sheet-head{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:18px 20px 14px;border-bottom:1px solid var(--hair);
  }
  .sheet-head h2{margin:0;font-size:17px;font-weight:700;letter-spacing:.02em}
  .sheet-head .sub{font-size:11px;color:var(--muted);margin-top:3px;
    font-family:"Space Mono",monospace;letter-spacing:.08em}
  .sheet-close{
    flex:none;width:34px;height:34px;border-radius:50%;border:1px solid var(--hair);
    background:rgba(13,11,22,.6);color:var(--text);font-size:18px;line-height:1;cursor:pointer;
    transition:border-color .2s}
  .sheet-close:hover{border-color:var(--accent)}
  .sheet-close:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .modes{display:flex;gap:2px;padding:14px 20px 4px}
  .modes button{
    flex:1;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);
    background:rgba(13,11,22,.5);border:1px solid var(--hair);
    padding:9px 0;border-radius:11px;cursor:pointer;transition:color .2s, background .2s, border-color .2s;
  }
  .modes button.on{color:#1a0f14;background:var(--accent);border-color:var(--accent)}
  .modes button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .list{overflow-y:auto;padding:10px 14px 18px;display:flex;flex-direction:column;gap:8px}
  .item{
    display:block;width:100%;text-align:left;cursor:pointer;
    background:rgba(13,11,22,.4);border:1px solid var(--hair);border-radius:16px;
    padding:14px 16px;color:var(--text);font-family:inherit;transition:border-color .2s, background .2s, transform .1s;
  }
  .item:hover{border-color:var(--accent);background:rgba(255,90,110,.06)}
  .item:active{transform:scale(.99)}
  .item:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .item.current{border-color:var(--accent)}
  .item .row{display:flex;align-items:center;gap:10px}
  .item .num{font-family:"Space Mono",monospace;font-size:11px;color:var(--accent);font-weight:700}
  .item .name{font-size:16px;font-weight:700}
  .item .badge{margin-left:auto;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.08em;
    color:var(--muted);border:1px solid var(--hair);border-radius:999px;padding:3px 8px}
  .item .desc{font-size:12.5px;color:var(--muted);line-height:1.6;margin-top:7px}

  @media (prefers-reduced-motion:reduce){.feed{scroll-behavior:auto}.card{transition:none}}
  @media (max-width:480px){.card{width:100vw;height:100dvh;border-radius:0;border:0}.counter{bottom:14px}}
</style>
</head>
<body>

<div class="feed" id="feed" tabindex="0" aria-label="スワイプフィード"></div>

<div class="hud">
  <button class="menu-btn" id="menuBtn" aria-label="お品書きを開く" aria-haspopup="dialog">
    <span class="dots"><i></i><i></i><i></i></span>
  </button>
  <nav class="rail" id="rail" aria-label="カード一覧"></nav>
</div>
<div class="counter" id="counter"><b>01</b> / 01</div>
<div class="hint" id="hint">↑ ↓ ・ スワイプ ・ 下に無限ループ</div>
<div class="toast" id="toast"></div>

<!-- お品書き（カタログ）モーダル -->
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="お品書き">
  <div class="sheet-panel">
    <div class="sheet-head">
      <div>
        <h2 id="sheetTitle">お品書き</h2>
        <div class="sub" id="sheetCount">0 ITEMS</div>
      </div>
      <button class="sheet-close" id="sheetClose" aria-label="閉じる">×</button>
    </div>
    <div class="modes" role="group" aria-label="表示順">
      <button id="m-seq" class="on">順番</button>
      <button id="m-rnd">ランダム</button>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<script>
/* =====================================================================
   ■ お品書き（表示するアプリ一覧）は menu.json で管理します。
     - menu.json の "apps" にエントリを足すだけで増やせます。
     - 各 .html は apps/ フォルダに置きます（iframe の src で読み込み）。
     - 各 .html は自己完結で（外部依存なし）。
   ■ ローカル確認は file:// では fetch がブロックされることがあります。
     その場合は簡易サーバー（例: python -m http.server）経由で開いてください。
   ===================================================================== */
const APPS_DIR = 'apps/';
const MENU_URL = 'menu.json';

let CARDS = [];                        // [{file,title,tag,description,src}]

const feed = document.getElementById('feed');
const rail = document.getElementById('rail');
const counter = document.getElementById('counter');
const toastEl = document.getElementById('toast');

let order = [];
let current = 0;
let mode = 'seq';

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ===== レンダリング（無限ループ用にデッキを3つ縦に並べる） ===== */
const COPIES = 3;
function render(){
  const n = order.length;
  feed.innerHTML=''; rail.innerHTML='';
  if(!n){ paint(); return; }
  for(let copy=0; copy<COPIES; copy++){
    order.forEach((idx,pos)=>{
      const c=CARDS[idx];
      const slide=document.createElement('section');
      slide.className='slide'; slide.dataset.pos=pos; slide.dataset.global=copy*n+pos;
      const card=document.createElement('div'); card.className='card';
      const tag=document.createElement('div'); tag.className='tag'; tag.textContent=c.title||('#'+(idx+1)); card.appendChild(tag);
      const frame=document.createElement('iframe');
      frame.loading='lazy';
      frame.setAttribute('sandbox','allow-scripts allow-pointer-lock allow-popups');
      frame.title=c.title||('card '+(idx+1));
      frame.src=c.src;
      card.appendChild(frame); slide.appendChild(card); feed.appendChild(slide);
    });
  }
  order.forEach((idx,pos)=>{                       // rail は論理カード分だけ
    const dot=document.createElement('button'); dot.className='dot';
    dot.setAttribute('aria-label',(pos+1)+'枚目へ');
    dot.onclick=()=>jumpToPos(pos);
    rail.appendChild(dot);
  });
  current=0; observe(); paint();                   // 先に一度描画（rAF前でもカウンタを正しく）
  requestAnimationFrame(()=>{                       // 中央コピーの先頭へ瞬間移動
    const slideH=feed.clientHeight;
    feed.style.scrollBehavior='auto';
    feed.scrollTop = n*slideH;
    void feed.offsetHeight;
    feed.style.scrollBehavior='';
    paint();
  });
}

function jumpToPos(pos){                            // 中央コピーの該当カードへ
  const n=order.length; if(!n) return;
  feed.children[n+pos]?.scrollIntoView({block:'center'});
}

let io;
function observe(){
  if(io) io.disconnect();
  io=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting && e.intersectionRatio>0.55){
        current=+e.target.dataset.pos;
        [...feed.children].forEach(s=>s.classList.toggle('active', s===e.target));
        paint();
      }
    });
  },{root:feed,threshold:[0.55]});
  [...feed.children].forEach(s=>io.observe(s));
}

function paint(){
  [...rail.children].forEach((dt,i)=>dt.classList.toggle('on',i===current));
  counter.innerHTML=`<b>${String(current+1).padStart(2,'0')}</b> / ${String(order.length||0).padStart(2,'0')}`;
}

/* ===== 無限ループ：中央コピーへ静かに引き戻す ===== */
function go(d){
  const slideH=feed.clientHeight;
  const g=Math.round(feed.scrollTop/slideH);
  const t=Math.max(0, Math.min(feed.children.length-1, g+d));
  feed.children[t]?.scrollIntoView({block:'center'});
}
function reposition(){
  const n=order.length; if(!n) return;
  const slideH=feed.clientHeight;
  const g=Math.round(feed.scrollTop/slideH);
  const copy=Math.floor(g/n);
  if(copy===1) return;                 // すでに中央コピー
  feed.style.scrollBehavior='auto';
  feed.scrollTop=(g-(copy-1)*n)*slideH;
  void feed.offsetHeight;
  feed.style.scrollBehavior='';
}
let scrollStopT;
feed.addEventListener('scroll',()=>{clearTimeout(scrollStopT);scrollStopT=setTimeout(reposition,100);},{passive:true});
if('onscrollend' in feed) feed.addEventListener('scrollend',reposition);

/* キーボード */
feed.addEventListener('keydown',(ev)=>{
  if(['ArrowDown','j','ArrowRight'].includes(ev.key)){ev.preventDefault();go(1);}
  if(['ArrowUp','k','ArrowLeft'].includes(ev.key)){ev.preventDefault();go(-1);}
});

/* ===== 表示順モード ===== */
const seqBtn=document.getElementById('m-seq'), rndBtn=document.getElementById('m-rnd');
seqBtn.onclick=()=>setMode('seq'); rndBtn.onclick=()=>setMode('rnd');
function setMode(m){
  mode=m;
  seqBtn.classList.toggle('on',m==='seq'); rndBtn.classList.toggle('on',m==='rnd');
  const n=CARDS.length; order=(m==='rnd')?shuffle([...Array(n).keys()]):[...Array(n).keys()];
  render(); buildList();
}

/* ===== ヒント / トースト ===== */
const hint=document.getElementById('hint');
setTimeout(()=>hint.classList.add('gone'),4000);
feed.addEventListener('scroll',()=>hint.classList.add('gone'),{once:true});
let toastT;
function toast(msg){toastEl.textContent=msg;toastEl.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>toastEl.classList.remove('show'),2600);}

/* ===== お品書きモーダル ===== */
const sheet=document.getElementById('sheet');
const listEl=document.getElementById('list');
const menuBtn=document.getElementById('menuBtn');
const sheetClose=document.getElementById('sheetClose');

function buildList(){
  document.getElementById('sheetCount').textContent=CARDS.length+' ITEMS';
  listEl.innerHTML='';
  CARDS.forEach((c,idx)=>{
    const pos=order.indexOf(idx);
    const btn=document.createElement('button'); btn.className='item';
    btn.innerHTML=`<div class="row">`+
      `<span class="num">${String((pos<0?idx:pos)+1).padStart(2,'0')}</span>`+
      `<span class="name"></span>`+
      (c.tag?`<span class="badge"></span>`:``)+
      `</div>`+
      `<div class="desc"></div>`;
    btn.querySelector('.name').textContent=c.title||c.file;
    if(c.tag) btn.querySelector('.badge').textContent=c.tag;
    btn.querySelector('.desc').textContent=c.description||'';
    btn.onclick=()=>{ closeSheet(); if(pos>=0) jumpToPos(pos); };
    if(pos===current) btn.classList.add('current');
    listEl.appendChild(btn);
  });
}
function openSheet(){ buildList(); sheet.classList.add('on'); sheetClose.focus(); }
function closeSheet(){ sheet.classList.remove('on'); }
menuBtn.onclick=openSheet;
sheetClose.onclick=closeSheet;
sheet.addEventListener('click',e=>{ if(e.target===sheet) closeSheet(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&sheet.classList.contains('on')) closeSheet(); });

/* ===== 起動：menu.json を読み込む ===== */
async function loadMenu(){
  try{
    const res=await fetch(MENU_URL,{cache:'no-cache'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    const apps=Array.isArray(data)?data:(data.apps||[]);
    CARDS=apps.filter(a=>a&&a.file).map(a=>({
      file:a.file,
      title:a.title||a.file.replace(/\.html?$/i,''),
      tag:a.tag||'',
      description:a.description||'',
      src:/^https?:\/\//i.test(a.file)?a.file:APPS_DIR+a.file,
    }));
    if(data.title) document.title=data.title;
    if(!CARDS.length){ toast('menu.json にアプリがありません'); }
  }catch(err){
    toast('menu.json を読み込めませんでした');
    console.error('menu.json load failed:',err);
    CARDS=[];
  }
  order=[...Array(CARDS.length).keys()];
  render(); buildList(); feed.focus();
}
loadMenu();
</script>
</body>
</html>
