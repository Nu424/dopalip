<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FLIP DECK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#141220; --panel:#1d1a2b; --hair:#2f2b42;
    --text:#ECEAF4; --muted:#8f88a8; --accent:#FF5A6E;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(120% 80% at 50% -10%, #221d36 0%, var(--ink) 55%) fixed, var(--ink);
    color:var(--text); font-family:"Space Grotesk", system-ui, sans-serif; overflow:hidden;
  }

  /* ===== スワイプ本体 ===== */
  .feed{
    height:100dvh; overflow-y:scroll; scroll-snap-type:y mandatory;
    scrollbar-width:none; -webkit-overflow-scrolling:touch; scroll-behavior:smooth;
  }
  .feed::-webkit-scrollbar{display:none}
  .slide{
    height:100dvh; scroll-snap-align:center; scroll-snap-stop:always;
    display:grid; place-items:center; padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .card{
    position:relative; width:min(430px,94vw); height:min(92dvh,860px);
    border-radius:26px; background:var(--panel); border:1px solid var(--hair);
    box-shadow:0 30px 80px -30px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.02) inset;
    overflow:hidden; transform:scale(.965); opacity:.5;
    transition:transform .5s cubic-bezier(.2,.8,.2,1), opacity .5s;
  }
  .slide.active .card{transform:scale(1);opacity:1}
  .card iframe{width:100%;height:100%;border:0;display:block;background:#000}
  .tag{
    position:absolute;top:12px;left:12px;z-index:2;
    font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.08em;color:var(--text);
    background:rgba(10,8,18,.55);backdrop-filter:blur(6px);padding:5px 9px;border-radius:999px;
    border:1px solid rgba(255,255,255,.1);pointer-events:none;max-width:70%;overflow:hidden;
    white-space:nowrap;text-overflow:ellipsis;
  }

  /* ===== HUD ===== */
  .hud{position:fixed;inset:0;pointer-events:none;z-index:20}
  .mode{
    position:absolute;top:18px;left:18px;pointer-events:auto;display:flex;gap:2px;
    background:rgba(13,11,22,.6);backdrop-filter:blur(10px);border:1px solid var(--hair);
    border-radius:999px;padding:3px;
  }
  .mode button{
    font-family:inherit;font-size:13px;font-weight:500;color:var(--muted);background:none;border:0;
    padding:7px 14px;border-radius:999px;cursor:pointer;transition:color .2s, background .2s;
  }
  .mode button.on{color:#1a0f14;background:var(--accent)}
  .mode button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .tools{
    position:absolute;top:18px;right:18px;pointer-events:auto;display:flex;gap:8px;align-items:center;
  }
  .tools button{
    font-family:inherit;font-size:13px;font-weight:500;color:var(--text);
    background:rgba(13,11,22,.6);backdrop-filter:blur(10px);border:1px solid var(--hair);
    border-radius:999px;padding:8px 14px;cursor:pointer;transition:border-color .2s, background .2s;
  }
  .tools button:hover{border-color:var(--accent)}
  .tools button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .tools .reconnect{color:#1a0f14;background:var(--accent);border-color:var(--accent)}

  .rail{
    position:absolute;right:16px;top:50%;transform:translateY(-50%);pointer-events:auto;
    display:flex;flex-direction:column;align-items:center;gap:10px;max-height:60dvh;overflow:hidden;
  }
  .rail .dot{width:5px;border:0;background:var(--hair);border-radius:999px;height:14px;cursor:pointer;
    transition:height .25s, background .25s;padding:0;flex:none}
  .rail .dot.on{height:30px;background:var(--accent)}
  .rail .dot:focus-visible{outline:2px solid var(--accent);outline-offset:3px}

  .counter{
    position:fixed;right:16px;bottom:20px;z-index:20;pointer-events:none;
    font-family:"Space Mono",monospace;font-size:13px;letter-spacing:.1em;color:var(--muted);text-align:right;
  }
  .counter b{color:var(--accent);font-weight:700}

  .hint{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:20;font-size:12px;
    color:var(--muted);letter-spacing:.04em;pointer-events:none;transition:opacity .6s}
  .hint.gone{opacity:0}

  .toast{
    position:fixed;left:50%;top:64px;transform:translateX(-50%) translateY(-12px);z-index:40;
    background:var(--accent);color:#1a0f14;font-weight:700;font-size:13px;padding:9px 18px;border-radius:999px;
    opacity:0;pointer-events:none;transition:opacity .3s, transform .3s;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ドロップ用オーバーレイ */
  .drop{
    position:fixed;inset:0;z-index:50;display:none;place-items:center;
    background:rgba(13,11,22,.86);backdrop-filter:blur(4px);
    border:3px dashed var(--accent);color:var(--text);text-align:center;
  }
  .drop.on{display:grid}
  .drop b{font-size:22px;display:block;margin-bottom:6px}
  .drop span{color:var(--muted)}

  @media (prefers-reduced-motion:reduce){.feed{scroll-behavior:auto}.card{transition:none}}
  @media (max-width:480px){.card{width:100vw;height:100dvh;border-radius:0;border:0}.counter{bottom:14px}}
</style>
</head>
<body>

<div class="feed" id="feed" tabindex="0" aria-label="スワイプフィード"></div>

<div class="hud">
  <div class="mode" role="group" aria-label="表示順">
    <button id="m-seq" class="on">順番</button>
    <button id="m-rnd">ランダム</button>
  </div>
  <div class="tools">
    <button id="reconnect" class="reconnect" style="display:none">再接続</button>
    <button id="load">📁 フォルダ</button>
  </div>
  <nav class="rail" id="rail" aria-label="カード一覧"></nav>
</div>
<div class="counter" id="counter"><b>01</b> / 01</div>
<div class="hint" id="hint">↑ ↓ ・ スワイプ ・ 下に無限ループ</div>
<div class="toast" id="toast"></div>

<div class="drop" id="drop"><div><b>ここにフォルダ（or .htmlファイル）をドロップ</b><span>中身を読み込んでカードにするよ</span></div></div>

<!-- フォルダ選択フォールバック用 -->
<input id="picker" type="file" webkitdirectory multiple accept=".html,.htm" style="display:none">

<script>
/* =====================================================================
   ■ 使い方は2つ。どっちもフレーム編集ナシ。
     A) 右上「📁 フォルダ」→ 1画面HTMLを入れたフォルダを選ぶ。
        ネタを足す時はそのフォルダに .html を保存するだけ。
        （Chrome系ならフォルダを記憶 → 次回「再接続」1クリックで復帰）
     B) フォルダ or .htmlファイルを画面にドラッグ＆ドロップ。
   ■ 各.htmlは“自己完結”で（CSS/JS/画像はインラインかdataURIに）。
     srcdocで読むので、外部の相対パス画像は表示されない点だけ注意。
   ■ 下の CARDS はフォルダ未読込のときに出るデモ。消してもOK。
   ===================================================================== */
const CARDS = [
  { title:"INTRO", srcdoc:`<style>html,body{margin:0;height:100%;display:grid;place-items:center;background:linear-gradient(160deg,#ff5a6e,#ff9a4d);color:#fff;font-family:system-ui,sans-serif;text-align:center;overflow:hidden}h1{font-size:clamp(34px,11vw,56px);margin:0;letter-spacing:-.02em;line-height:.95}p{margin:14px 0 26px;opacity:.9}button{font:inherit;font-weight:700;border:0;border-radius:999px;padding:13px 26px;background:#fff;color:#ff4d63;cursor:pointer}.spark{position:fixed;font-size:22px;pointer-events:none;animation:up 1.1s ease-out forwards}@keyframes up{to{transform:translateY(-160px) scale(.4);opacity:0}}</style><div><h1>FLIP<br>DECK</h1><p>スワイプして次のカードへ</p><button onclick="burst()">タップしてみ</button></div><script>function burst(){for(let i=0;i<14;i++){const s=document.createElement('div');s.className='spark';s.textContent=['✦','✧','♥','●'][i%4];s.style.left=(40+Math.random()*20)+'%';s.style.top='60%';document.body.appendChild(s);setTimeout(()=>s.remove(),1100);}}<\/script>` },
  { title:"TAP GAME", srcdoc:`<style>html,body{margin:0;height:100%;display:grid;place-items:center;background:#10101c;color:#eee;font-family:system-ui,sans-serif;text-align:center}.n{font-size:88px;font-weight:800;color:#FF5A6E;line-height:1}.t{color:#888;margin:6px 0 22px}button{font:inherit;font-weight:700;border:0;border-radius:18px;padding:18px 40px;background:#FF5A6E;color:#1a0f14;cursor:pointer;font-size:18px}</style><div><div class="t" id="t">5秒で何回タップできる？</div><div class="n" id="n">0</div><div style="height:18px"></div><button id="b">スタート</button></div><script>let c=0,run=false;const n=document.getElementById('n'),t=document.getElementById('t'),b=document.getElementById('b');b.onclick=()=>{if(b.dataset.over){c=0;n.textContent=0;t.textContent='5秒で何回タップできる？';b.textContent='スタート';run=false;delete b.dataset.over;return}if(run){c++;n.textContent=c;return}run=true;b.textContent='連打！';c=0;n.textContent=0;const end=Date.now()+5000;const iv=setInterval(()=>{const r=Math.max(0,(end-Date.now())/1000);t.textContent='のこり '+r.toFixed(1)+'s';if(r<=0){clearInterval(iv);t.textContent='結果！ もう一回？';b.textContent='リセット';b.dataset.over=1;}},50);};<\/script>` },
  { title:"おみくじ", srcdoc:`<style>html,body{margin:0;height:100%;display:grid;place-items:center;background:radial-gradient(circle at 50% 30%,#2a2440,#14111f);color:#eee;font-family:system-ui,sans-serif;text-align:center}.r{font-size:clamp(40px,15vw,72px);font-weight:800;min-height:1.1em;transition:transform .3s;letter-spacing:.04em}.s{color:#aaa;margin:10px 26px 26px}button{font:inherit;font-weight:700;border:0;border-radius:999px;padding:14px 30px;background:#FF5A6E;color:#1a0f14;cursor:pointer}</style><div><div class="r" id="r">？</div><div class="s" id="s">引いてみよ</div><button onclick="roll()">おみくじ</button></div><script>const F=[['大吉','今日は何やってもいい日。'],['吉','まあまあ。寝ろ。'],['中吉','悪くない。コーヒー飲も。'],['小吉','小さい勝ちを拾え。'],['末吉','後半に来るタイプ。'],['凶','まあ、そういう日もある。']];function roll(){const r=document.getElementById('r'),s=document.getElementById('s');let n=0;const iv=setInterval(()=>{r.textContent=F[Math.floor(Math.random()*F.length)][0];if(++n>10){clearInterval(iv);const f=F[Math.floor(Math.random()*F.length)];r.textContent=f[0];s.textContent=f[1];r.style.transform='scale(1.15)';setTimeout(()=>r.style.transform='scale(1)',150);}},60);}<\/script>` },
  { title:"AMBIENT", srcdoc:`<style>html,body{margin:0;height:100%;overflow:hidden;background:#0c0b14;font-family:system-ui,sans-serif}.blob{position:absolute;border-radius:50%;filter:blur(40px);opacity:.5;animation:float 9s ease-in-out infinite}@keyframes float{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-40px) scale(1.2)}}.txt{position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:clamp(20px,6vw,30px);font-weight:300;letter-spacing:.1em;text-align:center}</style><div class="blob" style="width:240px;height:240px;background:#FF5A6E;left:5%;top:15%"></div><div class="blob" style="width:200px;height:200px;background:#5ad1ff;right:8%;bottom:18%;animation-delay:-3s"></div><div class="blob" style="width:160px;height:160px;background:#b35aff;left:35%;bottom:30%;animation-delay:-6s"></div><div class="txt">ただ眺めるだけの<br>カードもあっていい</div>` },
  { title:"MIXER", srcdoc:`<style>html,body{margin:0;height:100%;transition:background .15s;font-family:system-ui,sans-serif;color:#fff}.wrap{height:100%;display:grid;place-items:center;background:rgba(0,0,0,.18)}.hex{font-family:monospace;font-size:34px;font-weight:700;text-shadow:0 2px 12px rgba(0,0,0,.5);margin-bottom:24px}input{width:200px;display:block;margin:12px auto;accent-color:#fff}label{font-size:12px;opacity:.85;text-transform:uppercase;letter-spacing:.1em}</style><div class="wrap"><div style="text-align:center"><div class="hex" id="hex">#888888</div><label>R</label><input type="range" id="r" min="0" max="255" value="136"><label>G</label><input type="range" id="g" min="0" max="255" value="136"><label>B</label><input type="range" id="b" min="0" max="255" value="136"></div></div><script>const e=['r','g','b'].map(i=>document.getElementById(i));function up(){const v=e.map(x=>+x.value);const h='#'+v.map(x=>x.toString(16).padStart(2,'0')).join('');document.body.style.background=h;document.getElementById('hex').textContent=h.toUpperCase();}e.forEach(x=>x.oninput=up);up();<\/script>` },
];

/* ===== フレーム本体（基本いじらなくてOK） ===== */
const feed = document.getElementById('feed');
const rail = document.getElementById('rail');
const counter = document.getElementById('counter');
const toastEl = document.getElementById('toast');

let userCards = null;                 // フォルダから読んだカード（あれば優先）
function deck(){ return (userCards && userCards.length) ? userCards : CARDS; }
let order = deck().map((_, i) => i);
let current = 0;

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

const COPIES = 3;                       // 無限ループ用にデッキを3つ縦に並べる
function render(){
  const d = deck();
  const n = order.length;
  feed.innerHTML=''; rail.innerHTML='';
  for(let copy=0; copy<COPIES; copy++){
    order.forEach((idx,pos)=>{
      const c=d[idx];
      const slide=document.createElement('section');
      slide.className='slide'; slide.dataset.pos=pos; slide.dataset.global=copy*n+pos;
      const card=document.createElement('div'); card.className='card';
      const tag=document.createElement('div'); tag.className='tag'; tag.textContent=c.title||('#'+(idx+1)); card.appendChild(tag);
      const frame=document.createElement('iframe');
      frame.loading='lazy';
      frame.setAttribute('sandbox','allow-scripts allow-pointer-lock allow-popups');
      frame.title=c.title||('card '+(idx+1));
      if(c.srcdoc) frame.srcdoc=c.srcdoc; else if(c.src) frame.src=c.src;
      card.appendChild(frame); slide.appendChild(card); feed.appendChild(slide);
    });
  }
  order.forEach((idx,pos)=>{                       // railはN個（論理カード分）だけ
    const dot=document.createElement('button'); dot.className='dot';
    dot.setAttribute('aria-label',(pos+1)+'枚目へ');
    dot.onclick=()=>feed.children[n+pos].scrollIntoView({block:'center'});  // 中央コピーへ
    rail.appendChild(dot);
  });
  current=0; observe();
  requestAnimationFrame(()=>{                       // 中央コピーの先頭へ瞬間移動
    const slideH=feed.clientHeight;
    feed.style.scrollBehavior='auto';
    feed.scrollTop = n*slideH;
    void feed.offsetHeight;
    feed.style.scrollBehavior='';
    paint();
  });
}

let io;
function observe(){
  if(io) io.disconnect();
  io=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting && e.intersectionRatio>0.55){
        current=+e.target.dataset.pos;
        [...feed.children].forEach(s=>s.classList.toggle('active', s===e.target));
        paint();
      }
    });
  },{root:feed,threshold:[0.55]});
  [...feed.children].forEach(s=>io.observe(s));
}

function paint(){
  [...rail.children].forEach((dt,i)=>dt.classList.toggle('on',i===current));
  counter.innerHTML=`<b>${String(current+1).padStart(2,'0')}</b> / ${String(order.length).padStart(2,'0')}`;
}

/* ===== 無限ループ：中央コピーへ静かに引き戻す ===== */
function go(d){
  const slideH=feed.clientHeight;
  const g=Math.round(feed.scrollTop/slideH);
  const t=Math.max(0, Math.min(feed.children.length-1, g+d));
  feed.children[t].scrollIntoView({block:'center'});
}
// スクロールが止まったら、中央コピー以外にいる場合は1デッキ分ずらして中央へ戻す。
// 戻った先は“同じカード”なので見た目は無変化＝下に進み続けられる。
function reposition(){
  const n=order.length; if(!n) return;
  const slideH=feed.clientHeight;
  const g=Math.round(feed.scrollTop/slideH);
  const copy=Math.floor(g/n);
  if(copy===1) return;                 // すでに中央コピー
  feed.style.scrollBehavior='auto';
  feed.scrollTop=(g-(copy-1)*n)*slideH;
  void feed.offsetHeight;
  feed.style.scrollBehavior='';
}
let scrollStopT;
feed.addEventListener('scroll',()=>{clearTimeout(scrollStopT);scrollStopT=setTimeout(reposition,100);},{passive:true});
if('onscrollend' in feed) feed.addEventListener('scrollend',reposition);

/* キーボード */
feed.addEventListener('keydown',(ev)=>{
  if(['ArrowDown','j','ArrowRight'].includes(ev.key)){ev.preventDefault();go(1);}
  if(['ArrowUp','k','ArrowLeft'].includes(ev.key)){ev.preventDefault();go(-1);}
});

/* モード切替 */
const seqBtn=document.getElementById('m-seq'), rndBtn=document.getElementById('m-rnd');
seqBtn.onclick=()=>setMode('seq'); rndBtn.onclick=()=>setMode('rnd');
function setMode(m){
  seqBtn.classList.toggle('on',m==='seq'); rndBtn.classList.toggle('on',m==='rnd');
  const n=deck().length; order=(m==='rnd')?shuffle([...Array(n).keys()]):[...Array(n).keys()];
  render();
}

/* ===== ヒント/トースト ===== */
const hint=document.getElementById('hint');
setTimeout(()=>hint.classList.add('gone'),4000);
feed.addEventListener('scroll',()=>hint.classList.add('gone'),{once:true});
let toastT;
function toast(msg){toastEl.textContent=msg;toastEl.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>toastEl.classList.remove('show'),2200);}

/* ===== ファイル → カード ===== */
function setUserCards(list){
  if(!list.length){toast('.html が見つからなかった');return;}
  list.sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true,sensitivity:'base'}));
  userCards=list.map(f=>({title:f.name.replace(/\.html?$/i,''), srcdoc:f.text}));
  order=[...Array(userCards.length).keys()];
  seqBtn.classList.add('on'); rndBtn.classList.remove('on');
  render(); toast(userCards.length+' 枚読み込んだ');
}

/* ドラッグ&ドロップ（フォルダ/ファイル両対応） */
async function entriesFromDrop(dt){
  const out=[];
  const items=[...(dt.items||[])].map(i=>i.webkitGetAsEntry&&i.webkitGetAsEntry()).filter(Boolean);
  async function walk(entry){
    if(entry.isFile){
      if(/\.html?$/i.test(entry.name)){const f=await new Promise((r,j)=>entry.file(r,j));out.push({name:entry.name,text:await f.text()});}
    }else if(entry.isDirectory){
      const rd=entry.createReader(); const all=[]; let batch;
      do{batch=await new Promise((r,j)=>rd.readEntries(r,j));all.push(...batch);}while(batch.length);
      for(const e of all) await walk(e);
    }
  }
  for(const e of items) await walk(e);
  if(!out.length && dt.files){for(const f of dt.files){if(/\.html?$/i.test(f.name))out.push({name:f.name,text:await f.text()});}}
  return out;
}
const dropEl=document.getElementById('drop');
let dragDepth=0;
window.addEventListener('dragenter',e=>{e.preventDefault();if(dragDepth++===0)dropEl.classList.add('on');});
window.addEventListener('dragover',e=>e.preventDefault());
window.addEventListener('dragleave',e=>{if(--dragDepth<=0){dragDepth=0;dropEl.classList.remove('on');}});
window.addEventListener('drop',async e=>{
  e.preventDefault();dragDepth=0;dropEl.classList.remove('on');
  setUserCards(await entriesFromDrop(e.dataTransfer));
});

/* フォルダ選択（webkitdirectory フォールバック） */
const picker=document.getElementById('picker');
picker.addEventListener('change',async e=>{
  const files=[...e.target.files].filter(f=>/\.html?$/i.test(f.name));
  const list=await Promise.all(files.map(async f=>({name:f.webkitRelativePath||f.name,text:await f.text()})));
  setUserCards(list.map(x=>({name:x.name.split('/').pop(),text:x.text})));
});

/* ===== File System Access：フォルダ記憶（Chrome系のみ／無ければ自動フォールバック） ===== */
const reconnectBtn=document.getElementById('reconnect');
const loadBtn=document.getElementById('load');
const FSA='showDirectoryPicker' in window;

function idb(mode,key,val){return new Promise((res,rej)=>{
  let db; try{db=indexedDB.open('flipdeck',1);}catch(_){return res(null);}
  db.onupgradeneeded=()=>db.result.createObjectStore('kv');
  db.onerror=()=>res(null);
  db.onsuccess=()=>{try{const tx=db.result.transaction('kv',mode==='get'?'readonly':'readwrite');const st=tx.objectStore('kv');
    if(mode==='get'){const r=st.get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>res(null);}
    else{st.put(val,key);tx.oncomplete=()=>res(true);tx.onerror=()=>res(null);}}catch(_){res(null);}};
});}

async function readHandle(handle){
  const list=[];
  for await(const entry of handle.values()){
    if(entry.kind==='file' && /\.html?$/i.test(entry.name)){const f=await entry.getFile();list.push({name:entry.name,text:await f.text()});}
  }
  setUserCards(list);
}

async function pickFolder(){
  if(FSA){
    try{
      const handle=await window.showDirectoryPicker();
      await idb('set','dir',handle).catch(()=>{});
      reconnectBtn.style.display='none';
      await readHandle(handle);
      return;
    }catch(err){ if(err && err.name==='AbortError') return; /* 失敗時は下のフォールバックへ */ }
  }
  picker.click();   // FSA非対応 or 失敗 → 通常のフォルダ選択
}
loadBtn.onclick=pickFolder;

reconnectBtn.onclick=async()=>{
  const handle=await idb('get','dir'); if(!handle){reconnectBtn.style.display='none';return;}
  try{
    let p=await handle.queryPermission({mode:'read'});
    if(p!=='granted') p=await handle.requestPermission({mode:'read'});
    if(p==='granted'){reconnectBtn.style.display='none';await readHandle(handle);}
  }catch(_){reconnectBtn.style.display='none';}
};

/* 起動時：記憶したフォルダがあれば復帰を試みる */
(async()=>{
  render();           // まずデモ表示
  feed.focus();
  if(!FSA) return;
  const handle=await idb('get','dir'); if(!handle) return;
  try{
    const p=await handle.queryPermission({mode:'read'});
    if(p==='granted'){ await readHandle(handle); }
    else { reconnectBtn.style.display=''; }   // 許可待ち → ボタンで再接続
  }catch(_){}
})();
</script>
